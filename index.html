    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://diensa.com/#website",
            "url": "https://diensa.com/",
            "name": "Capture Chess",
            "description": "Turn any chess board into instant analysis with your phone camera.",
            "inLanguage": "en-US"
          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://diensa.com/#app",
            "name": "Capture Chess",
            "operatingSystem": "iOS",
            "applicationCategory": "GameApplication",
            "downloadUrl": "https://apps.apple.com/app/id6778191746",
            "description": "Take a photo of a real chess board and instantly analyze the position, discover openings and find the best moves.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            },
            "featureList": [
              "Chess board recognition",
              "Engine analysis with Stockfish",
              "Opening explorer",
              "Guided learning",
              "Offline support"
            ],
            "screenshot": "https://diensa.com/screenshots/mobile-home.png"
          },
          {
            "@type": "FAQPage",
            "@id": "https://diensa.com/#faq",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "How does Capture Chess detect a board from a photo?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Capture Chess uses on-device computer vision to locate the board, detect pieces, and build a legal FEN position from your photo — no server upload required."
                }
              },
              {
                "@type": "Question",
                "name": "Does Capture Chess work offline?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. Board recognition and Stockfish engine analysis run locally on your device, so you can scan and analyze positions without an internet connection."
                }
              },
              {
                "@type": "Question",
                "name": "What chess engine does Capture Chess use?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Capture Chess uses Stockfish WASM for deep engine analysis, evaluation bars, and best-move arrows directly on your phone."
                }
              },
              {
                "@type": "Question",
                "name": "Can I learn openings with Capture Chess?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. The opening explorer and guided learning modules help you study lines, practice positions, and track your progress."
                }
              }
            ]
          }
        ]
      }
    </script>
